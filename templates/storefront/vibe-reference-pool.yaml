  - id: ex-018
    anchors: [bold-maximalist]
    applicableCategories: [fashion-apparel, books-media]
    descriptor: "Layered pattern beds with kinetic type stacks."
    story: "Two patterns per section, oversized lettering that bleeds across cards, product photos sit on gradient grounds; cart is a confident slab."
    antiPatterns:
      - "Restrained whitespace — undercuts the energy."
  - id: ex-019
    anchors: [luxury, editorial]
    applicableCategories: [jewelry-watches, travel-luggage]
