    story: "Low-key palette, slow vertical pacing, product cards live inside dark gallery walls; trust signals are press quotes set in italic serif."
    antiPatterns:
      - "Bright orange accents — wrong tonality."
  - id: ex-020
    anchors: [tech-cyber]
    applicableCategories: [digital-goods, audio-electronics]
    descriptor: "Console-grade neutrals with monospaced microcopy."
    story: "Hairline borders, system labels in mono, product specs lead the card; promo bands look like update logs."
    antiPatterns:
