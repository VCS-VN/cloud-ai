  - id: ex-022
    anchors: [refined-classic, minimalist]
    applicableCategories: [wellness-supplements, beauty-personal-care]
    descriptor: "Apothecary calm with serif eyebrows on ivory."
    story: "Single primary CTA per fold, ingredient roll-call in italic, hero photo of a single bottle; promo bands stay quiet."
    antiPatterns:
      - "Loud rotating banners — breaks the calm."
  - id: ex-023
    anchors: [editorial, playful]
    applicableCategories: [books-media, kids-toys]
    descriptor: "Magazine grid with playful illustration insets."
    story: "Two-column body holds long-form copy; whimsical illustration breaks anchor each section so the layout reads like a children's magazine."
