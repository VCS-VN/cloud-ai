# Contract: Categories YAML Schema

**Path**: `templates/storefront/categories.yaml`
**Loader**: `loadCategoryTaxonomy()` trong `src/features/ai-agent/design/library-loader.server.ts`
**Authoritative**: TR-016 — single source; mọi consumer (taxonomy-enrichment, block-library cross-check, telemetry) đều đi qua loader này.

## Top-level shape

```yaml
version: 1
primary:
  - id: fashion-apparel
    label: "Fashion & Apparel"
    description: "Quần áo, phụ kiện, retail thời trang."
    subcategories:
      - id: streetwear
        label: Streetwear
      - id: tailored
        label: Tailored
      - id: athleisure
        label: Athleisure
  - id: home-living
    label: "Home & Living"
    subcategories:
      - id: furniture
        label: Furniture
      - id: ceramics
        label: Ceramics
```

## Field rules

| Field | Type | Required | Constraint |
|---|---|---|---|
| `version` | integer | yes | == 1 |
| `primary[]` | array | yes | size ~20 (D24); minItems 5, maxItems 30 |
| `primary[].id` | string | yes | `/^[a-z][a-z0-9-]*$/`, unique |
| `primary[].label` | string | yes | non-empty |
| `primary[].description` | string \| null | no | optional human-facing |
| `primary[].subcategories[]` | array | yes | minItems 1, maxItems 12 |
| `primary[].subcategories[].id` | string | yes | unique trong scope primary cha |
| `primary[].subcategories[].label` | string | yes | non-empty |

## Cross-asset checks

1. Tổng số subcategory tổng thuộc dải [80, 150] (D24 — soft target ~80-120, allow buffer 30 cho mở rộng).
2. Không có `primary[].id` trùng nhau.
3. Trong cùng primary, `subcategories[].id` không trùng nhau (giữa primary khác nhau cho phép trùng).

## Reference shape (consumer)

```ts
type CategoryTaxonomy = {
  version: 1;
  primary: Array<{
    id: string;
    label: string;
    description?: string | null;
    subcategories: Array<{ id: string; label: string }>;
  }>;
};

function lookupCategory(taxonomy: CategoryTaxonomy, primaryId: string, subId: string | null):
  | { primary: ...; subcategory: ... | null; status: "found" | "soft-miss" }
  | null;
```

`status = "soft-miss"` khi `subId` không tồn tại nhưng `primaryId` hợp lệ (R-009). Caller fallback về primary và log telemetry để bổ sung sau (TR-017).

## Failure modes

| Lỗi | Hành vi |
|---|---|
| YAML parse / schema fail | throw tại boot |
| `primary` rỗng hoặc tổng subcategory < 80 | warn (CI gate); cho phép trong dev nhưng release-checklist phải fail |
| Trùng `primary.id` | throw |

## Tests

- Categories valid → load PASS.
- Trùng `primary.id` → FAIL.
- Trùng `subcategory.id` trong cùng primary → FAIL.
- `lookupCategory` với `subId` không tồn tại → trả `status = "soft-miss"`.
