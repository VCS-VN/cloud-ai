# Contract: Block Library YAML Schema

**Path**: `templates/storefront/block-library.yaml`
**Loader**: `src/features/ai-agent/design/library-loader.server.ts` (R-001)
**Validator**: zod schema in `src/features/ai-agent/design/blocks-manifest.ts` (`BlockLibrarySchema`)

## Top-level shape

```yaml
version: 1
blocks:
  - blockId: hero
    tier: high-impact
    requirementLevel: tier-1
    defaultPosition: 2
    applicableCategories: null            # null = match-all primary
    applicableSubcategories: null
    applicableVibes: null
    commerceGoal: discovery
    compositionRules:
      mustPrecede: [feature-band, product-grid]
      mustFollow: [header]
      mutuallyExclusive: []
      maxOccurrences: 1
    variants:
      - variantId: editorial-overlay
        shape: "Full-bleed image, oversized type, single primary CTA pinned bottom-left"
        vibeAffinity:
          editorial: 0.9
          minimalist: 0.7
          retro: 0.4
        notes: null
      - variantId: split-grid
        shape: "Two-up grid: image left, copy + dual CTA right"
        vibeAffinity:
          minimalist: 0.85
          tech-cyber: 0.6
```

## Field rules

| Field | Type | Required | Constraint |
|---|---|---|---|
| `version` | integer | yes | == 1 cho schema này |
| `blocks[]` | array | yes | minItems = 1 |
| `blocks[].blockId` | string | yes | `/^[a-z][a-z0-9-]*$/`, unique trong file |
| `blocks[].tier` | enum | yes | `high-impact` \| `supporting` |
| `blocks[].requirementLevel` | enum | yes | `tier-1` \| `group` \| `optional` |
| `blocks[].requirementGroup` | string \| null | conditional | required khi `requirementLevel = group` |
| `blocks[].defaultPosition` | integer \| null | conditional | required (>=0) khi `requirementLevel = tier-1`; null cho group/optional |
| `blocks[].applicableCategories` | string[] \| null | no | mọi phần tử ∈ `categories.yaml` primary.id |
| `blocks[].applicableSubcategories` | string[] \| null | no | tham chiếu `<primary>/<sub>` |
| `blocks[].applicableVibes` | string[] \| null | no | mọi phần tử ∈ Anchor.id |
| `blocks[].commerceGoal` | enum | yes | `discovery` \| `conversion` \| `trust` \| `retention` |
| `blocks[].compositionRules.mustPrecede` | string[] | yes | có thể rỗng |
| `blocks[].compositionRules.mustFollow` | string[] | yes | có thể rỗng |
| `blocks[].compositionRules.mutuallyExclusive` | string[] | yes | có thể rỗng |
| `blocks[].compositionRules.maxOccurrences` | integer | yes | >=1 |
| `blocks[].variants[]` | array | yes | minItems = 1 |
| `blocks[].variants[].variantId` | string | yes | unique trong block |
| `blocks[].variants[].shape` | string | yes | non-empty |
| `blocks[].variants[].vibeAffinity` | object | yes | keys ∈ Anchor.id, values ∈ [0, 1] |
| `blocks[].variants[].notes` | string \| null | no | reviewer notes |

## Cross-asset checks (loader)

1. Mọi `applicableCategories[]` ∈ tập `categories.yaml` primary.id.
2. Mọi `applicableSubcategories[]` viết dạng `<primary>/<sub>` và phải tồn tại trong taxonomy.
3. Mọi `applicableVibes[]` và `vibeAffinity` keys ∈ tập `vibe-reference-pool.yaml` anchors[].id.
4. `compositionRules.mustPrecede`/`mustFollow`/`mutuallyExclusive` chỉ tham chiếu blockId tồn tại trong file.
5. Mỗi variant có ít nhất 1 anchor với `vibeAffinity[anchor] >= 0.5`.

## Failure modes

| Lỗi | Hành vi |
|---|---|
| YAML parse error | throw tại load; pipeline không khởi động |
| Schema mismatch (zod) | throw với path lỗi; CI test sẽ catch |
| Cross-asset reference rỗng (vd anchor `legacy` chưa định nghĩa) | throw tại boot |

## Tests phải tồn tại

- `block-library.yaml` parse + zod parse PASS.
- Một entry tier-1 không có `defaultPosition` → schema FAIL.
- Một entry group không có `requirementGroup` → schema FAIL.
- Một variant có `vibeAffinity` key ngoài bounded anchors → cross-asset FAIL.
